name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config build-essential libgit2-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -- -D warnings

  integration-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fuse3 libfuse3-dev pkg-config build-essential libgit2-dev

      - name: Load FUSE kernel module
        run: sudo modprobe fuse || true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Unit tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

      - name: Cache nak binary
        id: nak-cache
        uses: actions/cache@v4
        with:
          path: ~/go/bin/
          key: nak-latest

      - name: Install nak (Nostr Army Knife)
        if: steps.nak-cache.outputs.cache-hit != 'true'
        run: |
          go install github.com/fiatjaf/nak@latest

      - name: Add nak to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Cache Cashu wallet
        uses: actions/cache@v4
        with:
          path: ~/.cashu/
          key: cashu-wallet-v1

      - name: Install Cashu CLI
        run: pip install cashu "marshmallow<4"

      - name: Fund CI Cashu wallet (skip if balance sufficient)
        run: |
          balance=$(cashu -h https://testnut.cashu.space -w ci-test -u sat -y balance 2>/dev/null | head -1 | grep -oP '\d+' || echo "0")
          if [ "$balance" -lt 500 ]; then
            echo "Balance: ${balance} sat — minting 5000 sat..."
            timeout 90 cashu -h https://testnut.cashu.space -w ci-test -u sat -y invoice 5000 || true
          else
            echo "Balance: ${balance} sat — skipping funding"
          fi

      - name: Run integration test (Blossom server + Cashu payment + FUSE mount)
        env:
          BLOSSOMFS_BIN: ./target/release/blossomfs
        run: bash scripts/ci_test.sh

      - name: Run tollgate integration test (NIP-94 relay + structured directory)
        env:
          BLOSSOMFS_BIN: ./target/release/blossomfs
        run: bash scripts/ci_tollgate_test.sh

      - name: Run NIP-34 integration test (ngit relay + git repo browser)
        env:
          BLOSSOMFS_BIN: ./target/release/blossomfs
        run: bash scripts/ci_nip34_test.sh

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-test-output
          path: |
            /tmp/blossom-ci/
            /tmp/blossom-ci-tollgate/
            /tmp/blossom-ci-nip34/
          retention-days: 7

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: blossomfs:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
